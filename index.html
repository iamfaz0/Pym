<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Gamers Support · Changia</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2f3d 0%, #14303e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* main card */
        .card {
            background: #ffffff;
            border-radius: 36px 36px 32px 32px;
            box-shadow: 0 25px 50px -8px rgba(0, 20, 30, 0.4);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* header with flag */
        .header {
            background: linear-gradient(115deg, #0d2f44, #1b4b6e);
            color: white;
            padding: 28px 24px 32px 24px;
            text-align: center;
            border-bottom: 4px solid #f9b81b;
        }

        .flag-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .flag-piece {
            width: 48px;
            height: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .green { background: #1EB53A; }
        .yellow { background: #FCD116; }
        .blue { background: #00A3DD; }
        .black { background: #000000; }

        .header h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 15px;
            opacity: 0.9;
            font-weight: 400;
        }

        /* main content area (visible by default) */
        #mainContent {
            display: block;
            padding: 20px 20px 28px 20px;
            background: white;
        }

        /* network dropdown (instead of badges) */
        .network-dropdown-container {
            background: #f2f8fd;
            border-radius: 28px;
            padding: 20px 18px;
            margin-bottom: 26px;
            border: 1px solid #d0e3f0;
        }

        .network-dropdown-container label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #0f344b;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .custom-dropdown {
            position: relative;
            width: 100%;
        }

        .custom-dropdown select {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #bdd6e8;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            color: #153e54;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%231b4b6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 18px;
        }

        .custom-dropdown select:focus {
            border-color: #1a658b;
            box-shadow: 0 0 0 3px rgba(20, 80, 120, 0.2);
        }

        .custom-dropdown select:hover {
            border-color: #397ea3;
        }

        /* form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #1e3b4c;
            font-size: 14px;
            margin-bottom: 8px;
        }

        label i {
            color: #0f4b6e;
            width: 18px;
        }

        .phone-row {
            display: flex;
            gap: 10px;
        }

        .prefix {
            background: #eaf1f7;
            border: 2px solid #cbdde9;
            border-radius: 18px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #1a3e54;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 15px 16px;
            border: 2px solid #d4e2ec;
            border-radius: 22px;
            font-size: 16px;
            background: white;
            transition: 0.15s;
        }

        input:focus {
            outline: none;
            border-color: #1d5b87;
            box-shadow: 0 0 0 3px rgba(16, 70, 110, 0.15);
        }

        .amount-hint {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 12px;
            color: #356f8c;
            padding: 0 6px;
        }

        .btn {
            background: #0b2b3f;
            color: white;
            border: none;
            padding: 18px 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            margin: 18px 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 10px 24px -8px #0b2b3f;
            border: 1px solid #ffffff30;
        }

        .btn:active { transform: scale(0.97); background: #08212f; }
        .btn:disabled { opacity: 0.5; box-shadow: none; }

        .btn.loading {
            color: transparent;
            pointer-events: none;
            position: relative;
        }
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* message */
        .message {
            padding: 14px 18px;
            border-radius: 18px;
            margin: 16px 0 8px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        .message.show { display: block; }
        .message.success { background: #d7f0dd; color: #0e4e1d; border-left: 6px solid #2e9b4c; }
        .message.error { background: #fee5e7; color: #a1222e; border-left: 6px solid #d42e3e; }
        .message.info { background: #dcf0fa; color: #145c83; border-left: 6px solid #1e7fb0; }

        /* donors section with animated single entry */
        .donors-section {
            margin-top: 28px;
        }
        .donors-title {
            font-size: 16px;
            font-weight: 700;
            color: #0b2b3f;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .donors-list {
            background: #f0f6fb;
            border-radius: 26px;
            padding: 24px 16px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #cde0ec;
            transition: all 0.2s;
        }

        /* single animated donor card */
        .animated-donor-card {
            background: white;
            border-radius: 30px;
            padding: 18px 22px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 10px 20px rgba(0, 45, 65, 0.1);
            border-left: 8px solid #1f648b;
            animation: fadeInOut 8s ease-in-out infinite;
            transition: transform 0.3s;
        }

        @keyframes fadeInOut {
            0% { opacity: 0.6; transform: scale(0.98); }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }

        .donor-avatar-large {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #13678e, #2a8fc2);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 26px;
            box-shadow: 0 6px 12px #13678e70;
        }

        .donor-info-large {
            flex: 1;
        }
        .donor-name-large {
            font-weight: 800;
            font-size: 20px;
            color: #0b2b3f;
            margin-bottom: 6px;
        }
        .donor-details-large {
            display: flex;
            gap: 16px;
            font-size: 15px;
            color: #2b5c79;
            flex-wrap: wrap;
            align-items: center;
        }
        .donor-amount-large {
            font-weight: 800;
            color: #166b9a;
            background: #e6f2fa;
            padding: 4px 16px;
            border-radius: 40px;
        }
        .donor-network-large {
            background: #dbeafe;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
        }
        .donor-time {
            color: #55879e;
        }

        /* status screen */
        .status-screen {
            background: white;
            padding: 40px 28px 38px;
            text-align: center;
            display: none;
            border-radius: 0;
        }
        .status-screen i.fa-spinner { font-size: 58px; color: #166b9a; margin-bottom: 16px; }
        .status-screen h3 { font-size: 26px; font-weight: 700; color: #0b2b3f; margin-bottom: 8px; }
        .status-screen p { color: #31647f; margin-bottom: 16px; font-size: 16px; }

        .transaction-id {
            background: #ebf4fa;
            padding: 14px 18px;
            border-radius: 60px;
            font-family: 'SF Mono', monospace;
            font-weight: 600;
            font-size: 15px;
            color: #0a344f;
            margin: 22px 0 24px;
            word-break: break-word;
            border: 1px dashed #569ac0;
        }

        .timer {
            font-size: 52px;
            font-weight: 800;
            color: #0b2b3f;
            letter-spacing: 4px;
            margin: 12px 0 24px;
            background: #ecf5fc;
            display: inline-block;
            padding: 8px 36px;
            border-radius: 80px;
        }

        #backBtn {
            background: #5f7e99;
            box-shadow: none;
            margin-top: 16px;
            font-size: 17px;
        }
        #backBtn i { margin-right: 6px; }

        /* footer with copyright symbol */
        .footer {
            text-align: center;
            margin-top: 18px;
            color: #bed7e8;
            font-size: 14px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .footer i {
            font-size: 13px;
            color: #e0edf5;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <!-- header with flag -->
        <div class="header">
            <div class="flag-row">
                <div class="flag-piece green"></div>
                <div class="flag-piece yellow"></div>
                <div class="flag-piece blue"></div>
                <div class="flag-piece black"></div>
            </div>
            <h1>support me</h1>
            <p>Kiasi chochote kuanzia 100 TSh</p>
        </div>

        <!-- main content (form + animated single donor) -->
        <div id="mainContent">
            <!-- network dropdown -->
            <div class="network-dropdown-container">
                <label><i class="fas fa-wifi"></i> Chagua mtandao wako</label>
                <div class="custom-dropdown">
                    <select id="networkSelect">
                        <option value="MPESA" selected>M-Pesa</option>
                        <option value="TIGO">Tigo</option>
                        <option value="AIRTEL">Airtel</option>
                        <option value="HALOTEL">Halotel</option>
                    </select>
                </div>
            </div>

            <!-- payment form -->
            <form id="paymentForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Jina lako</label>
                    <input type="text" id="fullName" placeholder="Mtu Mwema" value="Test User" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Namba ya simu</label>
                    <div class="phone-row">
                        <span class="prefix">+255</span>
                        <input type="tel" id="phone" placeholder="712345678" value="712345678" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-coins"></i> Kiasi (TSh)</label>
                    <input type="number" id="amount" min="100" max="10000000" value="500" step="50">
                    <div class="amount-hint">
                        <span>⏐ Chini 100</span>
                        <span>Juu 10,000,000 ⏐</span>
                    </div>
                </div>

                <div id="messageBox" class="message"></div>

                <button type="submit" class="btn" id="submitBtn">
                    <i class="fas fa-lock"></i> Changia sasa
                </button>
            </form>

            <!-- animated single donor -->
            <div class="donors-section">
                <div class="donors-title">
                    <i class="fas fa-heart" style="color: #d42e3e;"></i> Mchangiaji wa mwisho
                </div>
                <div class="donors-list" id="donorsList">
                    <!-- dynamic single donor card appears here -->
                </div>
            </div>
        </div>

        <!-- status overlay -->
        <div class="status-screen" id="statusScreen">
            <i class="fas fa-spinner fa-spin"></i>
            <h3>Inachakata...</h3>
            <p>Angalia simu yako na ingiza PIN</p>
            <div class="transaction-id" id="transactionId">-</div>
            <div class="timer" id="timer">02:00</div>
            <button class="btn" id="backBtn"><i class="fas fa-arrow-left"></i> Nyuma</button>
        </div>
    </div>

    <!-- footer -->
    <div class="footer">
        <i class="far fa-copyright"></i> Gamers community Tz 2019–206
    </div>
</div>

<script>
    (function() {
        // ========== API KEY ILIOFICHWA KWA BASE64 ==========
        // Hii ndio API key yako: FastLipa_ZqLdCAdSYhP5MUjpHsc
        // Imegeuzwa kuwa Base64: RmFzdExpcGFfWnFMZENBZFNZaFA1TVVqcEhzYw==
        const _encodedKey = ['RmFzdExpcGFfWnFMZENBZFNZaFA1TVVqcEhzYw=='];
        
        // Function ya kudecode Base64
        function _decodeBase64(str) {
            return atob(str);
        }
        
        // API key inaundwa kwa siri
        const API_KEY = (function() {
            return _decodeBase64(_encodedKey[0]);
        })();
        
        // API URL imefichwa kidogo
        const _urlParts = ['https://', 'api.fastlipa.com', '/api'];
        const API_URL = _urlParts.join('');
        
        // ========== DOM Elements ==========
        const mainContent = document.getElementById('mainContent');
        const statusScreen = document.getElementById('statusScreen');
        const form = document.getElementById('paymentForm');
        const fullName = document.getElementById('fullName');
        const phone = document.getElementById('phone');
        const amount = document.getElementById('amount');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        const networkSelect = document.getElementById('networkSelect');
        const transactionIdSpan = document.getElementById('transactionId');
        const timerEl = document.getElementById('timer');
        const backBtn = document.getElementById('backBtn');
        const donorsListDiv = document.getElementById('donorsList');

        // ========== State ==========
        let selectedNetwork = 'MPESA';
        let selectedNetworkName = 'M-Pesa';
        let currentTransaction = null;
        let timerInterval = null;
        let statusInterval = null;
        let startTime = null;
        let donorRotateInterval = null;

        // ========== Sample Donors ==========
        const namePool = [
            { name: 'John M.', amount: 5000, network: 'M-Pesa' },
            { name: 'Sarah K.', amount: 2000, network: 'Tigo' },
            { name: 'Peter L.', amount: 10000, network: 'Airtel' },
            { name: 'Anna T.', amount: 3000, network: 'Halotel' },
            { name: 'David R.', amount: 7000, network: 'M-Pesa' },
            { name: 'Grace M.', amount: 1500, network: 'Tigo' },
            { name: 'Joseph K.', amount: 2500, network: 'Halotel' },
            { name: 'Mary P.', amount: 8000, network: 'Airtel' },
            { name: 'James L.', amount: 4000, network: 'M-Pesa' },
            { name: 'Elizabeth W.', amount: 6000, network: 'Halotel' },
            { name: 'Daniel M.', amount: 9500, network: 'Tigo' },
            { name: 'Rebecca J.', amount: 3300, network: 'Airtel' },
            { name: 'Emmanuel S.', amount: 12000, network: 'M-Pesa' },
            { name: 'Lucas K.', amount: 2200, network: 'Halotel' },
            { name: 'Veronica T.', amount: 4500, network: 'Tigo' },
            { name: 'Samwel O.', amount: 1700, network: 'Airtel' },
            { name: 'Agnes P.', amount: 6000, network: 'M-Pesa' },
            { name: 'Shaban R.', amount: 8900, network: 'Halotel' },
            { name: 'Mwajuma F.', amount: 2700, network: 'Tigo' },
            { name: 'Hamza D.', amount: 5300, network: 'Airtel' }
        ];

        let currentDonorIndex = 0;

        // ========== Helper Functions ==========
        function showMessage(type, text) {
            messageBox.className = `message ${type} show`;
            messageBox.innerHTML = text;
            setTimeout(() => messageBox.classList.remove('show'), 5000);
        }

        function setLoading(loading) {
            if (loading) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
            } else {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        }

        function formatPhone(phoneNum) {
            let num = phoneNum.replace(/\D/g, '');
            if (num.startsWith('0')) num = '255' + num.substring(1);
            else if (!num.startsWith('255')) num = '255' + num;
            return num;
        }

        function updateNetworkFromDropdown() {
            const val = networkSelect.value;
            switch(val) {
                case 'MPESA': selectedNetworkName = 'M-Pesa'; break;
                case 'TIGO': selectedNetworkName = 'Tigo'; break;
                case 'AIRTEL': selectedNetworkName = 'Airtel'; break;
                case 'HALOTEL': selectedNetworkName = 'Halotel'; break;
                default: selectedNetworkName = 'M-Pesa';
            }
            selectedNetwork = val;
        }

        function detectNetworkFromPhone() {
            const num = phone.value.replace(/\D/g, '');
            let newNetwork = null;
            if (num.startsWith('71') || num.startsWith('74') || num.startsWith('75') || num.startsWith('76') || num.startsWith('79')) {
                newNetwork = 'MPESA';
            } else if (num.startsWith('72') || num.startsWith('77') || num.startsWith('650')) {
                newNetwork = 'TIGO';
            } else if (num.startsWith('73') || num.startsWith('78')) {
                newNetwork = 'AIRTEL';
            } else if (num.startsWith('62') || num.startsWith('65') || num.startsWith('67') || num.startsWith('68') || num.startsWith('69') || num.startsWith('613')) {
                newNetwork = 'HALOTEL';
            }
            if (newNetwork && networkSelect.value !== newNetwork) {
                networkSelect.value = newNetwork;
                updateNetworkFromDropdown();
            }
        }

        function validate() {
            const name = fullName.value.trim();
            const phoneNum = phone.value.replace(/\D/g, '');
            const amt = parseInt(amount.value);
            if (!name) { showMessage('error', '❌ Tafadhali weka jina lako'); return false; }
            if (phoneNum.length !== 9) { showMessage('error', '❌ Namba sahihi ina tarakimu 9'); return false; }
            if (amt < 100) { showMessage('error', '❌ Kiasi lazma kiwe ≥ 100 TSh'); return false; }
            if (amt > 10000000) { showMessage('error', '❌ Kiasi kikubwa sana, weka chini ya 10M'); return false; }
            return true;
        }

        // ========== API Calls ==========
        async function createTransaction(data) {
            const response = await fetch(API_URL + '/create-transaction', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    number: formatPhone(data.phone),
                    amount: data.amount,
                    name: data.name
                })
            });
            const text = await response.text();
            try { return JSON.parse(text); } catch { throw new Error(text); }
        }

        async function checkTransactionStatus(transactionId) {
            const response = await fetch(API_URL + '/status-transaction?tranid=' + transactionId, {
                headers: { 'Authorization': `Bearer ${API_KEY}` }
            });
            return await response.json();
        }

        // ========== Timer Functions ==========
        function startTimer() {
            startTime = Date.now();
            const TIMEOUT = 120000;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, TIMEOUT - elapsed);
                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                timerEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    clearInterval(statusInterval);
                    showMessage('info', '⏰ Muda umeisha. Jaribu tena.');
                    resetUI();
                }
            }, 200);
        }

        function startStatusCheck(transactionId) {
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(async () => {
                try {
                    const status = await checkTransactionStatus(transactionId);
                    if (status.payment_status === 'COMPLETED') {
                        clearInterval(statusInterval);
                        clearInterval(timerInterval);
                        
                        const newDonor = {
                            name: fullName.value.trim(),
                            amount: parseInt(amount.value),
                            network: selectedNetworkName
                        };
                        namePool.unshift(newDonor);
                        if (namePool.length > 40) namePool.pop();
                        
                        showMessage('success', '✅ MALIPO YAMEKAMILIKA! Asante sana.');
                        resetUI();
                    } else if (status.payment_status === 'FAILED') {
                        clearInterval(statusInterval);
                        clearInterval(timerInterval);
                        showMessage('error', '❌ Malipo yameshindwa. Jaribu tena.');
                        resetUI();
                    }
                } catch (err) { /* ignore */ }
            }, 2500);
        }

        function resetUI() {
            mainContent.style.display = 'block';
            statusScreen.style.display = 'none';
            if (timerInterval) clearInterval(timerInterval);
            if (statusInterval) clearInterval(statusInterval);
            currentTransaction = null;
        }

        // ========== Handle Submit ==========
        async function handleSubmit(e) {
            e.preventDefault();
            if (!validate()) return;

            updateNetworkFromDropdown();
            setLoading(true);
            showMessage('info', '⏳ Inatuma STK push...');

            try {
                const data = {
                    name: fullName.value.trim(),
                    phone: phone.value,
                    amount: parseInt(amount.value)
                };
                const result = await createTransaction(data);
                if (result.status === 'success' && result.data) {
                    currentTransaction = result.data;
                    mainContent.style.display = 'none';
                    statusScreen.style.display = 'block';
                    transactionIdSpan.textContent = currentTransaction.tranID || 'N/A';
                    startTimer();
                    startStatusCheck(currentTransaction.tranID);
                } else {
                    showMessage('error', `❌ ${result.message || 'STK haikutumwa'}`);
                }
            } catch (error) {
                let errMsg = error.message || '';
                if (errMsg.includes('Insufficient balance')) showMessage('error', '❌ Salio lako halitoshi.');
                else if (errMsg.includes('Unauthorized')) showMessage('error', '❌ API key si sahihi.');
                else showMessage('error', `❌ Hitilafu: ${errMsg.substring(0,60)}`);
            } finally {
                setLoading(false);
            }
        }

        // ========== Donor Display ==========
        function displaySingleDonor(index) {
            const donor = namePool[index % namePool.length];
            const timeOptions = ['dakika 2', 'dakika 5', 'dakika 8', 'dakika 12', 'dakika 15', 'dakika 22', 'dakika 30', 'sasa hivi'];
            const randomTime = timeOptions[Math.floor(Math.random() * timeOptions.length)];
            
            const cardHtml = `
                <div class="animated-donor-card">
                    <div class="donor-avatar-large">${donor.name.charAt(0)}</div>
                    <div class="donor-info-large">
                        <div class="donor-name-large">${donor.name}</div>
                        <div class="donor-details-large">
                            <span class="donor-amount-large">TSh ${donor.amount.toLocaleString()}</span>
                            <span class="donor-network-large">${donor.network}</span>
                            <span class="donor-time"><i class="far fa-clock"></i> ${randomTime}</span>
                        </div>
                    </div>
                </div>
            `;
            donorsListDiv.innerHTML = cardHtml;
        }

        function startDonorRotation() {
            displaySingleDonor(0);
            donorRotateInterval = setInterval(() => {
                currentDonorIndex = (currentDonorIndex + 1) % namePool.length;
                displaySingleDonor(currentDonorIndex);
            }, 7000);
        }

        // ========== Initialize ==========
        function init() {
            networkSelect.addEventListener('change', updateNetworkFromDropdown);

            phone.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0,9);
                detectNetworkFromPhone();
            });

            amount.addEventListener('input', function() {
                let v = parseInt(this.value);
                if (isNaN(v)) return;
                if (v < 100) this.value = 100;
                if (v > 10000000) this.value = 10000000;
            });

            form.addEventListener('submit', handleSubmit);
            backBtn.addEventListener('click', resetUI);

            updateNetworkFromDropdown();
            detectNetworkFromPhone();
            startDonorRotation();
        }

        init();
    })();
</script>
</body>
</html>
